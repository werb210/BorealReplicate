name: BF Website CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: npm run check

      - name: Generate sitemap
        run: npm run generate:sitemap

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
