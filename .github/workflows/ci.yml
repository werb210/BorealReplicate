name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure lockfile exists
        run: test -f package-lock.json || (echo "Missing lockfile" && exit 1)

      - name: Validate lockfile consistency
        run: |
          npm install --package-lock-only
          git diff --exit-code || (echo "Lockfile drift" && exit 1)

      - name: Validate dependency versions
        run: npm run check:versions

      - name: Validate React versions match
        run: |
          node -e "
          const p=require('./package.json');
          if(p.dependencies.react !== p.dependencies['react-dom']) {
            throw new Error('React mismatch');
          }
          "

      - name: Install dependencies
        run: npm ci

      - name: Validate install
        run: |
          test -d node_modules || exit 1
          npm ls || exit 1

      - name: Verify no raw fetch usage
        run: npm run verify:no-raw-fetch

      - name: Build
        run: |
          set -e
          npm run build 2>&1 | tee build.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
