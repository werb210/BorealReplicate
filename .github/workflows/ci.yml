name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enforce no test surface
        run: |
          chmod +x scripts/enforce-no-tests.sh
          ./scripts/enforce-no-tests.sh

      - name: Install (strict if possible)
        run: |
          if npm ci --ignore-scripts; then
            echo "Install succeeded"
          else
            echo "Install failed (registry restricted) — continuing build-only mode"
          fi

      - name: Build
        run: npm run build

      - name: Verify artifact integrity
        run: node scripts/verify-dist.js
