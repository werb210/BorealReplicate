name: BF Website CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run repo:guard

      - name: Fail if large blobs exist in git history
        run: |
          if git rev-list --objects --all | git cat-file --batch-check='%(objecttype) %(objectname) %(objectsize)' | awk '$1=="blob" && $3 > 1048576' | grep .; then
            echo "FAIL: large blobs still exist in history"
            exit 1
          fi

      - name: Enforce strict .git size budget
        run: |
          MAX_GIT_SIZE=80
          CURRENT=$(du -sm .git | cut -f1)

          if [ "$CURRENT" -gt "$MAX_GIT_SIZE" ]; then
            echo "FAIL: repo too large"
            exit 1
          fi

      - run: ./scripts/repo-audit.sh
      - run: npm ci
      - run: npm run check
      - run: npm run generate:sitemap
      - run: npm test
      - run: npm run build
