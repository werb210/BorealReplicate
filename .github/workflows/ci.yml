name: BF Website CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Node Version
        run: node -v

      - name: Type Check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No TypeScript config found"
          fi

      - name: Lint
        run: npx eslint . --ext .js,.ts,.tsx --ignore-path .gitignore

      - name: Run Tests
        run: npm test

      - name: Build
        run: |
          if npm run | grep -q "build"; then
            npm run build
          else
            echo "No build script found"
          fi

      - name: Production Audit (report only)
        run: |
          npm audit --omit=dev || true
