name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install deps
        run: npm ci

      - name: Validate install
        run: |
          test -d node_modules || exit 1
          npm ls || exit 1

      - name: Verify no raw fetch usage
        run: npm run verify:no-raw-fetch

      - name: Build
        run: npm run build
