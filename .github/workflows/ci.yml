name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      npm_config_registry: https://registry.npmjs.org/
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Hard reset npm config
        run: |
          npm config delete @jridgewell:registry || true
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config set registry https://registry.npmjs.org/

      - name: Verify registry
        run: npm run verify:registry

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install deps (retry)
        run: |
          npm ci --prefer-online --no-audit --progress=false || (sleep 3 && npm ci --prefer-online --no-audit --progress=false)

      - name: Validate install
        run: |
          test -d node_modules || exit 1
          npm ls || exit 1

      - name: Verify no raw fetch usage
        run: npm run verify:no-raw-fetch

      - name: Build
        run: npm run build
