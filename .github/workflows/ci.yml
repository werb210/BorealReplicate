name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enforce no test surface
        run: |
          chmod +x scripts/enforce-no-tests.sh
          ./scripts/enforce-no-tests.sh

      - name: Install (strict, no silent ignore)
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify artifact
        run: test -f dist/index.html
