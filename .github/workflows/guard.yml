name: Guardrails

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block Vitest usage
        run: |
          if rg -n --hidden --glob '!.git' --glob '!.github/workflows/guard.yml' "vitest" .; then
            echo "Vitest usage detected. Not allowed."
            exit 1
          fi
