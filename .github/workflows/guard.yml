name: Guardrails

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block test tooling (source only)
        run: |
          if grep -R "vitest" src --exclude-dir=node_modules | grep -q .; then
            echo "Vitest not allowed in website repo"
            exit 1
          fi
