name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # FORCE NODE VERSION (prevents Oryx installing Node 24)
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # BUILD THE APP YOURSELF (no Oryx guessing)
      - name: Install dependencies
        working-directory: client-app
        run: npm ci

      - name: Build
        working-directory: client-app
        run: npm run build

      # HARD FAIL IF BUILD IS WRONG
      - name: Verify build output
        run: |
          test -f client-app/dist/index.html
          ls -la client-app/dist

      # DEPLOY (NO Oryx build, NO root scanning)
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "client-app"
          output_location: "dist"
          skip_app_build: true
          skip_api_build: true
